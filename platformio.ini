; ============================================================
;  platformio.ini — Système biofeedback coureurs asymétriques
; ============================================================

[platformio]
default_envs = wrist, ankle_left, ankle_right

; ── Drapeaux partagés entre les cibles ESP32 ──────────────
[env:_esp32_base]
platform  = espressif32
board     = m5stick-c
framework = arduino
monitor_speed = 115200
lib_deps  = m5stack/M5Unified @ ^0.1.12
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/lib/HAL
    -I ${PROJECT_DIR}/lib/HAL/M5StickCPlus2
    -I ${PROJECT_DIR}/lib/algorithms
    -I ${PROJECT_DIR}/lib/core
    -I ${PROJECT_DIR}/lib/network

; ── Cible : Boîtier Poignet (Hub Maître) ─────────────────
[env:wrist]
extends         = env:_esp32_base
build_flags     = ${env:_esp32_base.build_flags} -D TARGET_WRIST
build_src_filter = +<wrist/> +<../lib/>

; ── Cible : Cheville Gauche ───────────────────────────────
[env:ankle_left]
extends         = env:_esp32_base
build_flags     = ${env:_esp32_base.build_flags} -D TARGET_ANKLE -D IS_LEFT_ANKLE
build_src_filter = +<ankle/> +<../lib/>

; ── Cible : Cheville Droite ───────────────────────────────
[env:ankle_right]
extends         = env:_esp32_base
build_flags     = ${env:_esp32_base.build_flags} -D TARGET_ANKLE -D IS_RIGHT_ANKLE
build_src_filter = +<ankle/> +<../lib/>

; ── Cible : Tests natifs PC (pio test -e native) ──────────
[env:native]
platform         = native
build_flags      =
    -std=gnu++17
    -D TARGET_NATIVE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/lib/HAL
    -I ${PROJECT_DIR}/lib/HAL/Mock
    -I ${PROJECT_DIR}/lib/HAL/M5StickCPlus2
    -I ${PROJECT_DIR}/lib/algorithms
    -I ${PROJECT_DIR}/lib/core
    -I ${PROJECT_DIR}/lib/network
lib_compat_mode  = off
lib_ignore       = M5Unified, M5GFX
test_filter      = env_native/*
build_src_filter = -<*>

; ── Cible : Tests hardware sur M5 ─────────────────────────
[env:m5_test]
extends         = env:_esp32_base
build_flags     = ${env:_esp32_base.build_flags} -D TARGET_M5_TEST
build_src_filter = -<*>
; FIX 3 : On force l'exécution STRICTE des tests physiques M5
test_filter     = env_m5/*
